name: Nix build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  nix-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31

      - name: nix-build
        run: nix-build
