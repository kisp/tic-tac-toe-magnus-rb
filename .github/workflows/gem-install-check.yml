name: Gem Install Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gem-install-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build gem
        run: bundle exec gem build tic_tac_toe_magnus.gemspec

      - name: Resolve gem filename
        id: gemfile
        run: echo "name=$(ls tic_tac_toe_magnus-*.gem)" >> $GITHUB_OUTPUT

      - name: Install and test in fresh Docker container
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/${{ steps.gemfile.outputs.name }}:/tmp/${{ steps.gemfile.outputs.name }}" \
            ruby:3.3 \
            bash -c "
              set -e
              echo '=== Ruby version ==='
              ruby --version

              echo '=== Installing gem with --user-install ==='
              gem install --user-install /tmp/${{ steps.gemfile.outputs.name }}

              echo '=== All installed .so files ==='
              find / -name '*.so' 2>/dev/null | grep tictactoe || echo 'none found'

              echo '=== gem_dir contents ==='
              ruby -e \"
                spec = Gem::Specification.find_by_name('tic_tac_toe_magnus')
                puts 'gem_dir: ' + spec.gem_dir
              \"
              GEM_ROOT=\$(ruby -e \"puts Gem::Specification.find_by_name('tic_tac_toe_magnus').gem_dir\")
              find \"\$GEM_ROOT\" -type f | sort

              echo '=== LOAD_PATH ==='
              ruby -e \"\\\$LOAD_PATH.each { |p| puts p }\"

              echo '=== Require test (from /tmp, no source tree) ==='
              cd /tmp
              ruby -e \"
                require 'tic_tac_toe_magnus'
                game = TicTacToe::Game.new
                raise 'Expected TicTacToe::Game instance, got ' + game.class.to_s unless game.is_a?(TicTacToe::Game)
                puts 'OK: required tic_tac_toe_magnus and instantiated TicTacToe::Game successfully'
              \"
            "
